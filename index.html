<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f5c5a">
  <title>Charity Census</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Charity Census</h1>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="census">Census</button>
      <button class="tab" data-view="intake">Intake</button>
      <button class="tab" data-view="archive">Archive</button>
    </nav>
  </header>

  <div class="backup-bar">
    <button id="export-btn" class="btn small">⬇ Export backup</button>
    <button id="import-btn" class="btn small">⬆ Import backup</button>
    <input type="file" id="import-file" accept="application/json" hidden>
    <span id="backup-status" class="fine-print"></span>
  </div>

  <main id="main">
    <section id="view-census" class="view active">
      <div id="census-list"></div>
    </section>

    <section id="view-intake" class="view">
      <textarea id="paste-box" rows="10"
        placeholder="Paste a NeuroReferral message from Viber here…"></textarea>
      <div class="intake-actions">
        <button id="parse-btn" class="btn primary">Parse referral</button>
        <button id="reset-btn" class="btn">Clear</button>
      </div>
      <div id="intake-result"></div>
    </section>

    <section id="view-archive" class="view">
      <div id="archive-list"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
