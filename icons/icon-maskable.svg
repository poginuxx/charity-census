<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background: maskable icons get cropped to arbitrary shapes,
       so no transparent corners; artwork kept inside the central safe zone. -->
  <rect width="512" height="512" fill="#0f5c5a"/>
  <g transform="translate(256 256) scale(0.8) translate(-256 -256)">
    <!-- clipboard body -->
    <rect x="136" y="112" width="240" height="312" rx="24" fill="#ffffff"/>
    <!-- clipboard clip -->
    <rect x="196" y="84" width="120" height="56" rx="16" fill="#0a4342"/>
    <!-- census lines -->
    <rect x="172" y="196" width="168" height="20" rx="10" fill="#0f5c5a" opacity="0.85"/>
    <rect x="172" y="244" width="168" height="20" rx="10" fill="#0f5c5a" opacity="0.55"/>
    <rect x="172" y="292" width="112" height="20" rx="10" fill="#0f5c5a" opacity="0.35"/>
    <!-- cross -->
    <rect x="300" y="316" width="24" height="72" rx="8" fill="#c62828"/>
    <rect x="276" y="340" width="72" height="24" rx="8" fill="#c62828"/>
  </g>
</svg>
